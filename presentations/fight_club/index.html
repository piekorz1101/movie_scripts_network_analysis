<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analiza Sieci Postaci — Fight Club</title>

  <!-- Reveal.js CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.1.0/reset.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.1.0/reveal.min.css" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />

  <style>
    /* ── Paleta Fight Club ── */
    :root {
      --black:   #0a0a0a;
      --dark:    #111111;
      --surface: #1a1a1a;
      --border:  #2a2a2a;
      --red:     #c0392b;
      --red-dim: #7b2018;
      --gold:    #c9a84c;
      --gold-dim:#7d6a2e;
      --white:   #e8e8e8;
      --muted:   #888888;
      --mono:    'Share Tech Mono', monospace;
      --display: 'Bebas Neue', sans-serif;
      --body:    'Inter', sans-serif;
    }

    .reveal-viewport { background: var(--black); }

    .reveal {
      font-family: var(--body);
      font-size: 1.6rem;
      color: var(--white);
    }

    /* ── Slide base ── */
    .reveal .slides section {
      height: 100%;
      text-align: left;
      padding: 0 3rem;
      box-sizing: border-box;
    }

    /* ── Slide type accent borders ── */
    .reveal .slides section.slide-concept {
      border-left: 4px solid var(--gold);
    }
    .reveal .slides section.slide-data {
      border-left: 4px solid #555;
    }
    .reveal .slides section.slide-interpretation {
      border-left: 4px solid var(--red);
    }

    /* ── Typography ── */
    .reveal h1 {
      font-family: var(--display);
      font-size: 3.8rem;
      letter-spacing: 0.12em;
      color: var(--red);
      text-transform: uppercase;
      margin-bottom: 0.2em;
      line-height: 1.05;
    }

    .reveal h2 {
      font-family: var(--display);
      font-size: 2.6rem;
      letter-spacing: 0.08em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 0.6em;
      line-height: 1.1;
    }

    .reveal h3 {
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.6rem;
    }

    .reveal p { margin: 0 0 0.6em; line-height: 1.55; }

    .reveal ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .reveal ul li {
      padding: 0.45em 0 0.45em 1.6em;
      position: relative;
      line-height: 1.5;
      border-bottom: 1px solid var(--border);
      font-size: 1rem;
    }

    .reveal ul li:last-child { border-bottom: none; }

    .reveal ul li::before {
      content: '▸';
      position: absolute;
      left: 0;
      color: var(--red);
      font-size: 0.85em;
      top: 0.55em;
    }

    /* ── Accent elements ── */
    .tag {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.25em 0.75em;
      border: 1px solid var(--red-dim);
      color: var(--red);
      border-radius: 2px;
      margin-bottom: 1rem;
    }

    .tag.gold { border-color: var(--gold-dim); color: var(--gold); }
    .tag.grey { border-color: #444; color: #999; }

    .def-box {
      background: var(--surface);
      border-left: 3px solid var(--red);
      padding: 0.9em 1.2em;
      margin: 0.8em 0 1.2em;
      font-family: var(--mono);
      font-size: 0.82rem;
      color: #ccc;
      line-height: 1.6;
    }

    .def-box.gold { border-color: var(--gold); }

    em { color: var(--gold); font-style: normal; font-weight: 600; }
    strong { color: var(--red); font-weight: 600; }

    /* ── Formula ── */
    .formula {
      font-family: var(--mono);
      font-size: 0.88rem;
      color: var(--gold);
      background: #0f0f0f;
      border: 1px solid var(--border);
      padding: 0.6em 1em;
      display: inline-block;
      margin: 0.5em 0 1em;
      letter-spacing: 0.04em;
    }

    /* ── Data table ── */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--mono);
      font-size: 0.85rem;
      margin: 1em 0;
    }
    .data-table th {
      text-align: left;
      color: var(--muted);
      letter-spacing: 0.15em;
      font-size: 0.7rem;
      text-transform: uppercase;
      padding: 0.4em 0.8em;
      border-bottom: 1px solid var(--border);
    }
    .data-table td {
      padding: 0.5em 0.8em;
      border-bottom: 1px solid var(--border);
      color: var(--white);
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table .val { color: var(--gold); font-weight: 600; }
    .data-table .bar {
      display: inline-block;
      height: 8px;
      background: var(--red-dim);
      border-radius: 2px;
      vertical-align: middle;
      margin-left: 0.5em;
    }
    .data-table .bar.highlight { background: var(--red); }

    /* ── ASCII diagram ── */
    .ascii-diagram {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: #bbb;
      background: #0d0d0d;
      border: 1px solid var(--border);
      padding: 1em 1.4em;
      line-height: 1.8;
      margin: 1em 0;
      letter-spacing: 0.02em;
    }
    .ascii-diagram .node { color: var(--gold); }
    .ascii-diagram .node-red { color: var(--red); }

    /* ── Community badges ── */
    .community-list { display: flex; flex-direction: column; gap: 0.6rem; margin-top: 0.5rem; }

    .community-item {
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
      font-size: 0.88rem;
      line-height: 1.4;
    }

    .c-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 0.3em;
    }

    .c-name { font-family: var(--mono); font-weight: 600; margin-right: 0.4em; }
    .c-count {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      margin-left: 0.3em;
    }

    /* ── Slide 1 — title ── */
    .title-slide {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
      overflow: hidden;
      isolation: isolate;
    }

    .title-slide.hero-layout {
      padding: 2rem 0;
    }

    .title-copy {
      position: relative;
      z-index: 2;
      max-width: 48%;
      padding-right: 2rem;
    }

    .title-slide .eyebrow {
      font-family: var(--mono);
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .title-slide h1 { font-size: 5.5rem; line-height: 0.95; }
    .title-slide .title-main {
      display: block;
    }
    .title-slide .title-alt {
      display: block;
      margin-top: 0.32em;
      font-size: 0.42em;
      line-height: 1;
      letter-spacing: 0.05em;
      color: var(--white);
      text-transform: none;
      font-style: italic;
      opacity: 0.88;
    }
    .title-slide .subtitle {
      font-family: var(--mono);
      font-size: 0.95rem;
      color: var(--gold);
      margin-top: 1.2rem;
      letter-spacing: 0.1em;
      max-width: 32rem;
    }
    .title-slide .meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 3rem;
      font-family: var(--mono);
      letter-spacing: 0.08em;
    }

    .title-graph {
      position: absolute;
      top: -8%;
      right: 0;
      bottom: -8%;
      width: 58%;
      z-index: 1;
      opacity: 0.98;
      border-left: 1px solid rgba(125, 106, 46, 0.18);
    }

    .title-graph::before,
    .title-graph::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .title-graph::before {
      background: linear-gradient(90deg,
        rgba(10, 10, 10, 1) 0%,
        rgba(10, 10, 10, 0.9) 16%,
        rgba(10, 10, 10, 0.42) 42%,
        rgba(10, 10, 10, 0.1) 100%);
    }

    .title-graph::after {
      background:
        radial-gradient(circle at 22% 50%, rgba(192, 57, 43, 0.16) 0%, rgba(192, 57, 43, 0) 34%),
        linear-gradient(180deg, rgba(10, 10, 10, 0.16) 0%, rgba(10, 10, 10, 0.32) 100%);
    }

    .title-graph iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
    }

    /* ── Anomaly node highlight ── */
    .node-highlight {
      font-family: var(--mono);
      font-size: 1.3rem;
      color: var(--red);
      border: 1px solid var(--red-dim);
      display: inline-block;
      padding: 0.4em 0.9em;
      margin: 0.8em 0;
      background: rgba(192, 57, 43, 0.07);
      letter-spacing: 0.05em;
    }

    /* ── Further research grid ── */
    .research-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-top: 0.8rem;
    }

    .research-item {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.75em 1em;
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .research-item .r-num {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--red);
      letter-spacing: 0.15em;
      display: block;
      margin-bottom: 0.3em;
    }

    /* ── iframe slide ── */
    .iframe-slide {
      padding: 0 !important;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .iframe-header {
      font-family: var(--display);
      font-size: 1.6rem;
      letter-spacing: 0.1em;
      color: var(--gold);
      text-transform: uppercase;
      padding: 0.5rem 2rem;
      background: var(--dark);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }

    .iframe-header .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      display: inline-block;
    }

    .iframe-slide iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: var(--black);
    }

    /* ── Density visual ── */
    .density-compare {
      display: flex;
      gap: 2rem;
      margin: 1em 0;
      align-items: flex-start;
    }

    .density-box {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1em;
      text-align: center;
      font-family: var(--mono);
      font-size: 0.75rem;
    }

    .density-box svg {
      display: block;
      margin: 0.5em auto;
    }

    .density-box .d-label {
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-size: 0.68rem;
    }
    .density-box .d-val {
      color: var(--gold);
      font-size: 1rem;
      display: block;
      margin-top: 0.3em;
    }

    /* ── Slide number ── */
    .reveal .slide-number {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      background: transparent;
    }

    /* ── Progress bar ── */
    .reveal .progress { background: var(--border); }
    .reveal .progress span { background: var(--red); }

    /* ── Controls ── */
    .reveal .controls button { color: var(--red); }

    /* ── Fragment animations ── */
    .reveal .fragment { opacity: 0.2; }
    .reveal .fragment.visible { opacity: 1; }

    /* ── Noise texture overlay ── */
    .reveal .slides::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.6;
    }

    /* ── Loading indicator ── */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      z-index: 99999;
    }
  </style>
</head>
<body>

<div id="loading">Ładowanie slajdów…</div>

<div class="reveal">
  <div class="slides" id="slides-container">
    <!-- Slides are loaded dynamically from slides/ directory -->
  </div>
</div>

<!-- Reveal.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.1.0/reveal.min.js"></script>
<script>
  /**
   * Slide manifest — each entry maps to a file in slides/
   * Order defines presentation order.
   */
  const SLIDE_FILES = [
    'slides/01_tytul.html',
    'slides/02_czym_jest_siec.html',
    'slides/03_density_pojecie.html',
    'slides/04_density_dane.html',
    'slides/05_density_interpretacja.html',
    'slides/06_degree_pojecie.html',
    'slides/07_degree_dane.html',
    'slides/08_degree_interpretacja.html',
    'slides/09_betweenness_pojecie.html',
    'slides/10_betweenness_dane.html',
    'slides/11_betweenness_interpretacja.html',
    'slides/12_closeness_pojecie.html',
    'slides/13_closeness_interpretacja.html',
    'slides/14_communities_pojecie.html',
    'slides/15_communities_dane.html',
    'slides/16_communities_interpretacja.html',
    'slides/17_clustering_pojecie.html',
    'slides/18_clustering_interpretacja.html',
    'slides/19_bridges_pojecie.html',
    'slides/20_bridges_interpretacja.html',
    'slides/21_dalsza_analiza.html',
    'slides/22_dashboard.html',
  ];

  async function loadAndInit() {
    const container = document.getElementById('slides-container');

    const responses = await Promise.all(
      SLIDE_FILES.map(f => fetch(f).then(r => {
        if (!r.ok) throw new Error(`Failed to load ${f}: ${r.status}`);
        return r.text();
      }))
    );

    responses.forEach(html => {
      container.insertAdjacentHTML('beforeend', html);
    });

    document.getElementById('loading').remove();

    Reveal.initialize({
      hash: true,
      slideNumber: 'c/t',
      progress: true,
      controls: true,
      controlsTutorial: false,
      center: false,
      transition: 'fade',
      transitionSpeed: 'slow',
      backgroundTransition: 'fade',
      width: 1280,
      height: 720,
      margin: 0.06,
      minScale: 0.2,
      maxScale: 2.0,
      plugins: [],
    });

    // Prevent Reveal scroll capturing on the dashboard iframe slide
    Reveal.on('slidechanged', ({ currentSlide }) => {
      if (currentSlide.classList.contains('iframe-slide')) {
        document.querySelector('.reveal').style.overflow = 'hidden';
      }
    });
  }

  loadAndInit().catch(err => {
    document.getElementById('loading').textContent = 'Błąd ładowania: ' + err.message;
    console.error(err);
  });
</script>
</body>
</html>
