<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analiza Sieci Postaci — Fight Club</title>

  <!-- Reveal.js CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.1.0/reset.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.1.0/reveal.min.css" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />

  <style>
    /* ── Paleta Fight Club ── */
    :root {
      --black:   #0a0a0a;
      --dark:    #111111;
      --surface: #1a1a1a;
      --border:  #2a2a2a;
      --red:     #c0392b;
      --red-dim: #7b2018;
      --gold:    #c9a84c;
      --gold-dim:#7d6a2e;
      --white:   #e8e8e8;
      --muted:   #888888;
      --mono:    'Share Tech Mono', monospace;
      --display: 'Bebas Neue', sans-serif;
      --body:    'Inter', sans-serif;
    }

    .reveal-viewport { background: var(--black); }

    .reveal {
      font-family: var(--body);
      font-size: 1.6rem;
      color: var(--white);
    }

    /* ── Slide base ── */
    .reveal .slides section {
      height: 100%;
      text-align: left;
      padding: 0 3rem;
      box-sizing: border-box;
    }

    /* ── Slide type accent borders ── */
    .reveal .slides section.slide-concept {
      border-left: 4px solid var(--gold);
    }
    .reveal .slides section.slide-data {
      border-left: 4px solid #555;
    }
    .reveal .slides section.slide-interpretation {
      border-left: 4px solid var(--red);
    }
    .reveal .slides section.slide-title {
      padding: 0;
      overflow: hidden;
    }

    /* ── Typography ── */
    .reveal h1 {
      font-family: var(--display);
      font-size: 3.8rem;
      letter-spacing: 0.12em;
      color: var(--red);
      text-transform: uppercase;
      margin-bottom: 0.2em;
      line-height: 1.05;
    }

    .reveal h2 {
      font-family: var(--display);
      font-size: 2.6rem;
      letter-spacing: 0.08em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 0.6em;
      line-height: 1.1;
    }

    .reveal h3 {
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.6rem;
    }

    .reveal p { margin: 0 0 0.6em; line-height: 1.55; }

    .reveal ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .reveal ul li {
      padding: 0.45em 0 0.45em 1.6em;
      position: relative;
      line-height: 1.5;
      border-bottom: 1px solid var(--border);
      font-size: 1rem;
    }

    .reveal ul li:last-child { border-bottom: none; }

    .reveal ul li::before {
      content: '▸';
      position: absolute;
      left: 0;
      color: var(--red);
      font-size: 0.85em;
      top: 0.55em;
    }

    /* ── Accent elements ── */
    .tag {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.25em 0.75em;
      border: 1px solid var(--red-dim);
      color: var(--red);
      border-radius: 2px;
      margin-bottom: 1rem;
      display: none;
    }

    .tag.gold { border-color: var(--gold-dim); color: var(--gold); }
    .tag.grey { border-color: #444; color: #999; }

    .def-box {
      background: var(--surface);
      border-left: 3px solid var(--red);
      padding: 0.9em 1.2em;
      margin: 0.8em 0 1.2em;
      font-family: var(--mono);
      font-size: 0.82rem;
      color: #ccc;
      line-height: 1.6;
    }

    .def-box.gold { border-color: var(--gold); }

    em { color: var(--gold); font-style: normal; font-weight: 600; }
    strong { color: var(--red); font-weight: 600; }

    /* ── Formula ── */
    .formula {
      font-family: var(--mono);
      font-size: 0.88rem;
      color: var(--gold);
      background: #0f0f0f;
      border: 1px solid var(--border);
      padding: 0.6em 1em;
      display: inline-block;
      margin: 0.5em 0 1em;
      letter-spacing: 0.04em;
    }

    /* ── Data table ── */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--mono);
      font-size: 0.85rem;
      margin: 1em 0;
    }
    .data-table th {
      text-align: left;
      color: var(--muted);
      letter-spacing: 0.15em;
      font-size: 0.7rem;
      text-transform: uppercase;
      padding: 0.4em 0.8em;
      border-bottom: 1px solid var(--border);
    }
    .data-table td {
      padding: 0.5em 0.8em;
      border-bottom: 1px solid var(--border);
      color: var(--white);
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table .val { color: var(--gold); font-weight: 600; }
    .data-table .bar {
      display: inline-block;
      height: 8px;
      background: var(--red-dim);
      border-radius: 2px;
      vertical-align: middle;
      margin-left: 0.5em;
    }
    .data-table .bar.highlight { background: var(--red); }

    /* ── ASCII diagram ── */
    .ascii-diagram {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: #bbb;
      background: #0d0d0d;
      border: 1px solid var(--border);
      padding: 1em 1.4em;
      line-height: 1.8;
      margin: 1em 0;
      letter-spacing: 0.02em;
    }
    .ascii-diagram .node { color: var(--gold); }
    .ascii-diagram .node-red { color: var(--red); }

    /* ── Slide 2 — SNA basics ── */
    .slide-sna-basics h2 {
      font-size: 3.05rem;
      margin-bottom: 0.38em;
    }
    .slide-sna-basics h3 {
      font-size: 1.14rem;
      margin-bottom: 1.15rem;
    }
    .slide-sna-basics .def-box {
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 0.82rem;
    }
    .slide-sna-basics .formula-inline {
      color: var(--gold);
      font-family: var(--mono);
      font-size: 0.9rem;
      letter-spacing: 0.03em;
    }
    .sna-intro-grid {
      display: grid;
      grid-template-columns: 1.02fr 0.98fr;
      align-items: start;
      gap: 1.1rem;
      margin-bottom: 0.9rem;
    }
    .sna-card {
      background: linear-gradient(180deg, #171717 0%, #121212 100%);
      border: 1px solid var(--border);
      padding: 0.84em 1.02em 0.95em;
    }
    .sna-card-title {
      font-family: var(--mono);
      font-size: 0.81rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.45rem;
    }
    .sna-mini-graph {
      width: 100%;
      height: auto;
      display: block;
      background: #0d0d0d;
      border: 1px solid #202020;
    }
    .sna-mini-graph .edge-line {
      stroke: #bfa360;
      stroke-width: 2.5;
      opacity: 0.85;
    }
    .sna-mini-graph .edge-line.edge-alt {
      stroke: #8f7a48;
      stroke-dasharray: 4 4;
      opacity: 0.75;
    }
    .sna-mini-graph .node-dot {
      fill: #942a20;
      stroke: #d8c7b0;
      stroke-width: 1.4;
    }
    .sna-mini-graph .node-dot.node-main {
      fill: #c0392b;
    }
    .sna-mini-graph .node-label {
      font-family: var(--mono);
      font-size: 12.8px;
      fill: #f0e6d8;
      letter-spacing: 0.08em;
    }
    .sna-mini-graph .guide-line {
      stroke: #8c8c8c;
      stroke-width: 1.1;
      stroke-dasharray: 4 4;
      marker-end: url(#sna-arrow-tip);
      opacity: 0.8;
    }
    .sna-mini-graph .guide-label {
      font-family: var(--mono);
      font-size: 12px;
      fill: #d2d2d2;
      letter-spacing: 0.13em;
    }
    .sna-mini-graph .guide-desc {
      font-family: var(--mono);
      font-size: 10.8px;
      fill: #909090;
      letter-spacing: 0.06em;
    }
    .sna-weight-card .formula {
      display: block;
      margin: 0.2em 0 0.65em;
      font-size: 0.9rem;
      padding: 0.5em 0.7em;
    }
    .weight-example {
      border-left: 3px solid var(--gold-dim);
      background: #101010;
      padding: 0.5em 0.7em;
      margin-bottom: 0.5em;
    }
    .weight-example:last-child {
      margin-bottom: 0;
    }
    .weight-example .w-head {
      font-family: var(--body);
      font-size: 0.98rem;
      margin-bottom: 0.25em;
      color: #dfdfdf;
    }
    .weight-example .w-scenes {
      font-family: var(--mono);
      font-size: 0.74rem;
      letter-spacing: 0.05em;
      color: var(--muted);
    }
    .weight-example .w-score {
      font-family: var(--mono);
      font-size: 0.95rem;
      font-weight: 600;
      margin-top: 0.25em;
      color: var(--gold);
    }
    .slide-sna-basics .intro-keypoints {
      position: relative;
      z-index: 2;
      margin-top: 0.15rem;
    }
    .slide-sna-basics .intro-keypoints li {
      font-size: 0.95rem;
      line-height: 1.34;
      padding-top: 0.24em;
      padding-bottom: 0.24em;
    }

    /* ── Community badges ── */
    .community-list { display: flex; flex-direction: column; gap: 0.6rem; margin-top: 0.5rem; }

    .community-item {
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
      font-size: 0.88rem;
      line-height: 1.4;
    }

    .c-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 0.3em;
    }

    .c-name { font-family: var(--mono); font-weight: 600; margin-right: 0.4em; }
    .c-count {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      margin-left: 0.3em;
    }

    /* ── Slide 1 — title ── */
    .title-slide {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
      overflow: hidden;
      isolation: isolate;
    }

    .title-slide.hero-layout {
      padding: 2rem 0 2rem 3rem;
    }

    .title-copy {
      position: relative;
      z-index: 2;
      max-width: 48%;
      padding-right: 2rem;
    }

    .title-slide .eyebrow {
      font-family: var(--mono);
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .title-slide h1 { font-size: 5.5rem; line-height: 0.95; }
    .title-slide .title-main {
      display: block;
    }
    .title-slide .title-alt {
      display: block;
      margin-top: 0.32em;
      font-size: 0.42em;
      line-height: 1;
      letter-spacing: 0.05em;
      color: var(--white);
      text-transform: none;
      font-style: italic;
      opacity: 0.88;
    }
    .title-slide .subtitle {
      font-family: var(--mono);
      font-size: 0.95rem;
      color: var(--gold);
      margin-top: 1.2rem;
      letter-spacing: 0.1em;
      max-width: 32rem;
    }
    .title-slide .meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 3rem;
      font-family: var(--mono);
      letter-spacing: 0.08em;
    }

    .title-graph {
      position: absolute;
      top: -8%;
      right: 0;
      bottom: -8%;
      width: 58%;
      z-index: 1;
      opacity: 0.98;
      overflow: hidden;
    }

    .title-graph::before,
    .title-graph::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .title-graph::before {
      background: linear-gradient(90deg,
        rgba(10, 10, 10, 0.98) 0%,
        rgba(10, 10, 10, 0.86) 12%,
        rgba(10, 10, 10, 0.56) 28%,
        rgba(10, 10, 10, 0.22) 48%,
        rgba(10, 10, 10, 0.1) 100%);
    }

    .title-graph::after {
      background:
        radial-gradient(circle at 22% 50%, rgba(192, 57, 43, 0.16) 0%, rgba(192, 57, 43, 0) 34%),
        linear-gradient(180deg, rgba(10, 10, 10, 0.16) 0%, rgba(10, 10, 10, 0.32) 100%);
    }

    .title-graph iframe {
      width: calc(100% + 12px);
      height: 100%;
      border: none;
      background: transparent;
      margin-left: -6px;
      margin-right: -6px;
    }

    /* ── Anomaly node highlight ── */
    .node-highlight {
      font-family: var(--mono);
      font-size: 1.3rem;
      color: var(--red);
      border: 1px solid var(--red-dim);
      display: inline-block;
      padding: 0.4em 0.9em;
      margin: 0.8em 0;
      background: rgba(192, 57, 43, 0.07);
      letter-spacing: 0.05em;
    }

    /* ── Further research grid ── */
    .research-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-top: 0.8rem;
    }

    .research-item {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.75em 1em;
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .research-item .r-num {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--red);
      letter-spacing: 0.15em;
      display: block;
      margin-bottom: 0.3em;
    }

    /* ── iframe slide ── */
    .reveal .slides section.iframe-slide {
      padding: 0 !important;
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .iframe-header {
      font-family: var(--display);
      font-size: 1.6rem;
      letter-spacing: 0.1em;
      color: var(--gold);
      text-transform: uppercase;
      padding: 0.5rem 2rem;
      background: var(--dark);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }

    .iframe-header .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      display: inline-block;
    }

    .reveal .slides section.iframe-slide iframe {
      width: 100%;
      height: 100%;
      min-height: 0;
      border: none;
      background: var(--black);
    }

    /* ── Slide 6 — Degree concept ── */
    .slide-degree-concept h2 {
      margin-bottom: 0.22em;
    }
    .slide-degree-concept h3 {
      margin-bottom: 0.95rem;
    }
    .degree-formula-hero {
      background: linear-gradient(180deg, #181818 0%, #121212 100%);
      border: 1px solid var(--border);
      border-left: 4px solid var(--red);
      padding: 0.75em 0.95em 0.68em;
      margin-bottom: 0.72rem;
    }
    .degree-formula-main {
      font-family: var(--mono);
      font-size: 1.52rem;
      color: var(--gold);
      letter-spacing: 0.03em;
      text-align: center;
      margin-bottom: 0.45rem;
    }
    .degree-formula-main sub,
    .degree-formula-main sup {
      font-size: 0.65em;
    }
    .degree-formula-legend {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.5rem;
      font-family: var(--mono);
      font-size: 0.68rem;
      color: #c8c8c8;
      letter-spacing: 0.03em;
    }
    .degree-formula-legend span {
      display: block;
      padding: 0.34em 0.45em;
      border: 1px solid rgba(123, 32, 24, 0.4);
      background: rgba(0, 0, 0, 0.24);
      line-height: 1.34;
    }
    .degree-formula-legend strong {
      color: var(--red);
    }
    .degree-analysis-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-bottom: 0.62rem;
    }
    .degree-card {
      background: #141414;
      border: 1px solid var(--border);
      padding: 0.62em 0.74em;
    }
    .degree-card-title {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.45rem;
    }
    .degree-points li {
      font-size: 0.82rem;
      line-height: 1.34;
      padding-top: 0.26em;
      padding-bottom: 0.26em;
    }
    .degree-steps {
      display: grid;
      gap: 0.35rem;
      margin-bottom: 0.45rem;
    }
    .degree-step {
      font-size: 0.81rem;
      line-height: 1.34;
      color: #d8d8d8;
      border-left: 2px solid var(--red-dim);
      padding-left: 0.5em;
    }
    .degree-step .k {
      display: inline-block;
      width: 1.2em;
      font-family: var(--mono);
      color: var(--gold);
    }
    .degree-norm {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--gold);
      letter-spacing: 0.03em;
      background: #101010;
      border: 1px solid var(--border);
      padding: 0.35em 0.5em;
    }
    .degree-examples {
      background: #121212;
      border: 1px solid var(--border);
      padding: 0.62em 0.74em;
    }
    .degree-example-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }
    .degree-example {
      border-left: 3px solid var(--red-dim);
      background: #0f0f0f;
      padding: 0.45em 0.55em;
    }
    .degree-example .name {
      font-family: var(--display);
      font-size: 1.12rem;
      color: var(--red);
      letter-spacing: 0.05em;
      line-height: 1;
      margin-bottom: 0.16em;
    }
    .degree-example .calc {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: #d0d0d0;
      line-height: 1.32;
    }
    .degree-example .calc strong {
      color: var(--gold);
    }
    .degree-example .interp {
      font-size: 0.78rem;
      color: #c2c2c2;
      margin-top: 0.28em;
      line-height: 1.34;
    }

    /* ── Density visual ── */
    .slide-density-concept h2 {
      margin-bottom: 0.22em;
    }
    .slide-density-concept h3 {
      margin-bottom: 1rem;
    }
    .density-formula-hero {
      background: linear-gradient(180deg, #181818 0%, #121212 100%);
      border: 1px solid var(--border);
      border-left: 4px solid var(--gold);
      padding: 0.85em 1em 0.75em;
      margin-bottom: 0.7rem;
    }
    .density-formula-main {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      margin-bottom: 0.55rem;
    }
    .density-formula-d,
    .density-formula-eq {
      font-family: var(--display);
      font-size: 3.1rem;
      line-height: 1;
      color: var(--gold);
    }
    .density-frac {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      min-width: 12.5ch;
    }
    .density-frac-top {
      font-family: var(--mono);
      color: var(--white);
      font-size: 1.8rem;
      line-height: 1.1;
      padding: 0 0.35em 0.08em;
    }
    .density-frac-bar {
      display: block;
      width: 100%;
      height: 2px;
      background: var(--gold);
      opacity: 0.9;
      margin: 0.05em 0;
    }
    .density-frac-bottom {
      font-family: var(--mono);
      color: var(--white);
      font-size: 1.25rem;
      line-height: 1.15;
      padding: 0.06em 0.35em 0;
    }
    .density-formula-legend {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.55rem;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: #c9c9c9;
      letter-spacing: 0.03em;
    }
    .density-formula-legend span {
      display: block;
      background: rgba(0, 0, 0, 0.24);
      border: 1px solid rgba(125, 106, 46, 0.24);
      padding: 0.35em 0.5em;
      line-height: 1.35;
    }
    .density-formula-legend strong {
      color: var(--gold);
    }
    .density-steps-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
    }
    .density-step {
      background: #131313;
      border: 1px solid var(--border);
      padding: 0.55em 0.7em 0.6em;
    }
    .density-step-final {
      border-color: rgba(201, 168, 76, 0.38);
      background: linear-gradient(180deg, #171410 0%, #13110f 100%);
    }
    .density-step-k {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.22em;
    }
    .density-step-v {
      font-size: 0.84rem;
      color: #e1e1e1;
      margin-bottom: 0.16em;
    }
    .density-step-calc {
      font-family: var(--mono);
      font-size: 0.84rem;
      line-height: 1.35;
      color: #d0d0d0;
    }
    .density-step-calc strong {
      color: var(--gold);
    }
    .density-step-note {
      margin-top: 0.5rem;
      font-family: var(--mono);
      font-size: 0.76rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .density-calc-grid {
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 1rem;
    }
    .density-calc-card {
      background: linear-gradient(180deg, #181818 0%, #121212 100%);
      border: 1px solid var(--border);
      padding: 0.8em 0.95em;
      min-height: 100%;
    }
    .density-calc-title {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.55rem;
    }
    .density-calc-card p {
      margin: 0.45em 0 0;
      font-size: 0.88rem;
      line-height: 1.45;
    }
    .density-keypoints {
      margin-top: 0.1rem;
    }
    .density-keypoints li {
      font-size: 0.85rem;
      line-height: 1.36;
      padding-top: 0.3em;
      padding-bottom: 0.3em;
    }

    .slide-density-data .formula {
      font-size: 0.82rem;
      margin: 0.3em 0 0.8em;
    }
    .density-compare {
      display: flex;
      gap: 1rem;
      margin: 0.7em 0 0.8em;
      align-items: flex-start;
    }

    .density-box {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.75em 0.8em;
      text-align: left;
      font-family: var(--mono);
      font-size: 0.75rem;
    }

    .density-box svg {
      display: block;
      margin: 0.45em auto 0.35em;
      width: 100%;
      max-width: 220px;
      height: auto;
    }

    .density-box .d-label {
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-size: 0.64rem;
      line-height: 1.4;
    }
    .density-box .d-val {
      color: var(--gold);
      font-size: 0.92rem;
      font-weight: 600;
      display: block;
      margin-top: 0.25em;
    }
    .density-box .d-note {
      font-size: 0.72rem;
      color: #b6b6b6;
      line-height: 1.42;
      margin-top: 0.35em;
    }
    .density-box-dense {
      border-color: rgba(201, 168, 76, 0.36);
    }
    .density-box-sparse {
      border-color: rgba(192, 57, 43, 0.45);
    }

    .density-takeaway-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-top: 0.15rem;
    }
    .density-takeaway {
      background: #111;
      border-left: 3px solid var(--red-dim);
      padding: 0.6em 0.8em;
      font-size: 0.78rem;
      line-height: 1.44;
      color: #d7d7d7;
    }
    .density-takeaway strong {
      color: var(--gold);
    }

    /* ── Slide number ── */
    .reveal .slide-number {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      background: transparent;
    }

    /* ── Progress bar ── */
    .reveal .progress { background: var(--border); }
    .reveal .progress span { background: var(--red); }

    /* ── Controls ── */
    .reveal .controls button { color: var(--red); }

    /* ── Fragment animations ── */
    .reveal .fragment { opacity: 0.2; }
    .reveal .fragment.visible { opacity: 1; }

    /* ── Noise texture overlay ── */
    .reveal .slides::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.6;
    }

    /* ── Loading indicator ── */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      z-index: 99999;
    }
  </style>
</head>
<body>

<div id="loading">Ładowanie slajdów…</div>

<div class="reveal">
  <div class="slides" id="slides-container">
    <!-- Slides are loaded dynamically from slides/ directory -->
  </div>
</div>

<!-- Reveal.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.1.0/reveal.min.js"></script>
<script>
  /**
   * Slide manifest — each entry maps to a file in slides/
   * Order defines presentation order.
   */
  const SLIDE_FILES = [
    'slides/01_tytul.html',
    'slides/10_degree.html',
    'slides/11_betweenness.html',
    'slides/12_closeness.html',
    'slides/13_pagerank.html',
    'slides/22_dashboard.html',
    'slides/20_stat_overview.html',
    'slides/21_centralnosc.html',
    'slides/22_spolecznosci.html',
    'slides/23_mosty_anomalie.html',
    'slides/24_dalsze_analizy.html',
  ];

  async function loadAndInit() {
    const container = document.getElementById('slides-container');

    const responses = await Promise.all(
      SLIDE_FILES.map(f => fetch(f).then(r => {
        if (!r.ok) throw new Error(`Failed to load ${f}: ${r.status}`);
        return r.text();
      }))
    );

    responses.forEach(html => {
      container.insertAdjacentHTML('beforeend', html);
    });

    document.getElementById('loading').remove();

    Reveal.initialize({
      hash: true,
      slideNumber: 'c/t',
      progress: true,
      controls: true,
      controlsTutorial: false,
      center: false,
      transition: 'fade',
      transitionSpeed: 'slow',
      backgroundTransition: 'fade',
      width: 1280,
      height: 720,
      margin: 0.06,
      minScale: 0.2,
      maxScale: 2.0,
      plugins: [],
    });

    // Keep iframe dashboard in sync when slide becomes visible
    Reveal.on('slidechanged', ({ currentSlide }) => {
      const revealEl = document.querySelector('.reveal');
      if (!revealEl) return;

      if (currentSlide.classList.contains('iframe-slide')) {
        revealEl.style.overflow = 'hidden';
        const iframe = currentSlide.querySelector('iframe');
        if (iframe && iframe.contentWindow) {
          iframe.contentWindow.postMessage({ type: 'fight-club:refresh-layout' }, '*');
        }
      } else {
        revealEl.style.overflow = '';
      }
    });
  }

  loadAndInit().catch(err => {
    document.getElementById('loading').textContent = 'Błąd ładowania: ' + err.message;
    console.error(err);
  });
</script>
</body>
</html>
