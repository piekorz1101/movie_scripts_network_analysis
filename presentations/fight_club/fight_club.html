<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIGHT CLUB — Analiza Sieci Postaci</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  :root {
    --bg-primary: #080706;
    --bg-secondary: #100e0c;
    --bg-panel: #120f0d;
    --bg-card: #1a1512;
    --red-blood: #b01c0a;
    --red-bright: #e02010;
    --yellow-bruise: #c8960a;
    --yellow-light: #e8b020;
    --cream: #d8cdc0;
    --gray-mid: #6a6058;
    --gray-light: #9a9088;
    --border: #2a2420;
    --border-accent: #3a2820;
    --font-display: 'Oswald', sans-serif;
    --font-mono: 'Share Tech Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--bg-primary);
    color: var(--cream);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 200px 200px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  body.hero-embed {
    overflow: hidden;
  }

  body.hero-embed::before {
    opacity: 0.22;
  }

  body.hero-embed #header,
  body.hero-embed #right-panel,
  body.hero-embed #interpretation,
  body.hero-embed #mode-controls,
  body.hero-embed #tooltip {
    display: none !important;
  }

  body.hero-embed #main-layout {
    grid-template-columns: 1fr;
    height: 100vh;
  }

  body.hero-embed #graph-container {
    border-right: none;
    background:
      radial-gradient(circle at 24% 50%, rgba(176, 28, 10, 0.18) 0%, rgba(176, 28, 10, 0) 24%),
      radial-gradient(ellipse at 55% 50%, #18100c 0%, #080706 72%);
  }

  body.hero-embed #graph-svg {
    cursor: grab;
  }

  /* HEADER */
  #header {
    position: relative;
    z-index: 10;
    padding: 18px 30px 14px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0d0a08 0%, transparent 100%);
    display: flex;
    align-items: baseline;
    gap: 20px;
  }

  #header h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 2.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--red-bright);
    text-shadow: 0 0 30px rgba(224,32,16,0.4), 2px 2px 0px #000;
    line-height: 1;
  }

  #header h1 span {
    color: var(--cream);
  }

  #header .subtitle {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--gray-mid);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    border-left: 2px solid var(--red-blood);
    padding-left: 14px;
  }

  .rule-one {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--red-blood);
    letter-spacing: 0.15em;
    opacity: 0.6;
    text-transform: uppercase;
  }

  /* MAIN LAYOUT */
  #main-layout {
    position: relative;
    z-index: 5;
    display: grid;
    grid-template-columns: 1fr 320px;
    height: calc(100vh - 65px);
  }

  /* LEFT: GRAPH CONTAINER */
  #graph-container {
    position: relative;
    overflow: hidden;
    background: radial-gradient(ellipse at 40% 50%, #1a0e08 0%, #080706 60%);
    border-right: 1px solid var(--border);
  }

  #mode-controls {
    position: absolute;
    top: 14px;
    left: 14px;
    z-index: 20;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .mode-btn {
    font-family: var(--font-display);
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 5px 12px;
    background: rgba(10,8,6,0.85);
    border: 1px solid var(--border-accent);
    color: var(--gray-mid);
    cursor: pointer;
    transition: all 0.2s;
  }

  .mode-btn:hover {
    border-color: var(--yellow-bruise);
    color: var(--yellow-light);
  }

  .mode-btn.active {
    background: var(--red-blood);
    border-color: var(--red-bright);
    color: var(--cream);
    box-shadow: 0 0 10px rgba(176,28,10,0.5);
  }

  #graph-svg {
    width: 100%;
    height: 100%;
  }

  /* RIGHT PANEL */
  #right-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg-panel);
  }

  /* NODE CARD */
  #node-card {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    min-height: 200px;
    flex-shrink: 0;
  }

  #node-card .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 160px;
    color: var(--gray-mid);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-align: center;
    gap: 8px;
  }

  #node-card .empty-state .icon {
    font-size: 1.8rem;
    opacity: 0.3;
  }

  #card-name {
    font-family: var(--font-display);
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--cream);
    margin-bottom: 6px;
    line-height: 1.1;
  }

  #card-community-tag {
    display: inline-block;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 2px 8px;
    margin-bottom: 10px;
  }

  .metric-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
  }

  .metric-label {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gray-mid);
    width: 80px;
    flex-shrink: 0;
  }

  .metric-bar-wrap {
    flex: 1;
    height: 3px;
    background: var(--border);
    position: relative;
  }

  .metric-bar-fill {
    height: 100%;
    background: var(--red-blood);
    transition: width 0.4s ease;
  }

  .metric-value {
    font-size: 0.6rem;
    color: var(--yellow-bruise);
    width: 40px;
    text-align: right;
    flex-shrink: 0;
  }

  .connections-title {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gray-mid);
    margin-top: 10px;
    margin-bottom: 6px;
    border-top: 1px solid var(--border);
    padding-top: 8px;
  }

  .conn-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.6rem;
    padding: 2px 0;
    color: var(--cream);
    opacity: 0.8;
  }

  .conn-weight {
    color: var(--yellow-bruise);
  }

  /* LEGEND */
  #legend {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #legend h3 {
    font-family: var(--font-display);
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gray-light);
    margin-bottom: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .legend-item:hover { opacity: 0.7; }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-label {
    font-size: 0.62rem;
    letter-spacing: 0.05em;
    color: var(--cream);
    text-transform: uppercase;
  }

  .legend-count {
    margin-left: auto;
    font-size: 0.55rem;
    color: var(--gray-mid);
  }

  /* RANKING */
  #ranking {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }

  #ranking-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .rank-tab {
    flex: 1;
    font-family: var(--font-display);
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 4px;
    text-align: center;
    cursor: pointer;
    color: var(--gray-mid);
    border-right: 1px solid var(--border);
    transition: all 0.2s;
  }

  .rank-tab:last-child { border-right: none; }
  .rank-tab:hover { color: var(--yellow-light); }
  .rank-tab.active {
    color: var(--red-bright);
    border-bottom: 2px solid var(--red-blood);
    background: rgba(176,28,10,0.08);
  }

  #ranking-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }

  #ranking-list::-webkit-scrollbar { width: 3px; }
  #ranking-list::-webkit-scrollbar-track { background: var(--bg-primary); }
  #ranking-list::-webkit-scrollbar-thumb { background: var(--border-accent); }

  .rank-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 14px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid rgba(42,36,32,0.3);
  }

  .rank-row:hover { background: rgba(176,28,10,0.08); }

  .rank-num {
    font-size: 0.55rem;
    color: var(--gray-mid);
    width: 16px;
    text-align: right;
    flex-shrink: 0;
  }

  .rank-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .rank-name {
    font-size: 0.62rem;
    letter-spacing: 0.05em;
    color: var(--cream);
    flex: 1;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .rank-bar-wrap {
    width: 40px;
    height: 2px;
    background: var(--border);
  }

  .rank-bar-fill {
    height: 100%;
    background: var(--red-blood);
  }

  .rank-val {
    font-size: 0.58rem;
    color: var(--yellow-bruise);
    width: 36px;
    text-align: right;
    flex-shrink: 0;
  }

  /* TOOLTIP */
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: rgba(10,8,6,0.95);
    border: 1px solid var(--red-blood);
    padding: 10px 14px;
    font-size: 0.62rem;
    color: var(--cream);
    z-index: 9999;
    max-width: 180px;
    display: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.8);
  }

  #tooltip .tt-name {
    font-family: var(--font-display);
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--yellow-light);
    margin-bottom: 6px;
    border-bottom: 1px solid var(--border-accent);
    padding-bottom: 4px;
  }

  #tooltip .tt-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 2px;
  }

  #tooltip .tt-key { color: var(--gray-mid); }
  #tooltip .tt-val { color: var(--cream); }

  /* INTERPRETATION SECTION */
  #interpretation {
    position: relative;
    z-index: 5;
    background: var(--bg-secondary);
    border-top: 2px solid var(--red-blood);
    padding: 50px 60px;
  }

  #interpretation h2 {
    font-family: var(--font-display);
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--red-bright);
    margin-bottom: 8px;
    text-shadow: 0 0 20px rgba(224,32,16,0.3);
  }

  #interpretation .section-rule {
    width: 80px;
    height: 2px;
    background: var(--red-blood);
    margin-bottom: 40px;
  }

  #interpretation h3 {
    font-family: var(--font-display);
    font-size: 1.0rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--yellow-light);
    margin-top: 36px;
    margin-bottom: 14px;
  }

  #interpretation p {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    line-height: 1.8;
    color: var(--cream);
    opacity: 0.85;
    margin-bottom: 14px;
    max-width: 900px;
  }

  #interpretation strong {
    color: var(--yellow-light);
    font-weight: normal;
  }

  #interpretation .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin: 24px 0;
    max-width: 700px;
  }

  #interpretation .stat-box {
    background: var(--bg-card);
    border: 1px solid var(--border-accent);
    padding: 16px;
    border-left: 3px solid var(--red-blood);
  }

  #interpretation .stat-box .s-val {
    font-family: var(--font-display);
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--red-bright);
    line-height: 1;
    margin-bottom: 4px;
  }

  #interpretation .stat-box .s-label {
    font-size: 0.58rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gray-mid);
  }

  .scratch-line {
    display: inline-block;
    width: 30px;
    height: 2px;
    background: var(--red-blood);
    margin: 0 6px;
    vertical-align: middle;
  }

  /* ── COLLAPSE BANNER ── */
  #collapse-banner {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    font-family: var(--font-display);
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--cream);
    background: rgba(176, 28, 10, 0.94);
    border: 1px solid var(--red-bright);
    padding: 5px 18px;
    display: none;
    pointer-events: none;
    white-space: nowrap;
    box-shadow: 0 0 18px rgba(176, 28, 10, 0.55);
  }

  /* ── BRIDGE RING PULSE ── */
  @keyframes bridgePulse {
    0%, 100% { stroke-opacity: 0.9; }
    50%       { stroke-opacity: 0.2; }
  }
  .bridge-ring {
    animation: bridgePulse 1.5s ease-in-out infinite;
    pointer-events: none;
  }

  /* ── ANOMALY RANKING ── */
  .anomaly-row .rank-val { color: var(--red-bright); }
  .anomaly-cols {
    display: flex;
    gap: 4px;
    align-items: center;
    flex-shrink: 0;
  }
  .anomaly-col {
    font-size: 0.5rem;
    color: var(--gray-mid);
    width: 32px;
    text-align: right;
  }
  .anomaly-col.hi { color: var(--yellow-bruise); }
  .anomaly-col.red { color: var(--red-bright); }
</style>
</head>
<body>

<div id="header">
  <h1><span>FIGHT </span>CLUB</h1>
  <div class="subtitle">Analiza Sieci Postaci<br>Social Network Analysis</div>
  <div class="rule-one">Pierwsza zasada: nie mówisz o sieci</div>
</div>

<div id="main-layout">
  <div id="graph-container">
    <div id="mode-controls">
      <button class="mode-btn active" data-mode="degree">Stopień</button>
      <button class="mode-btn" data-mode="betweenness">Pośrednictwo</button>
      <button class="mode-btn" data-mode="closeness">Bliskość</button>
      <button class="mode-btn" data-mode="pagerank">PageRank</button>
      <button class="mode-btn" data-mode="reset">↺ Reset</button>
      <div style="width:1px;height:18px;background:var(--border-accent);margin:0 2px;align-self:center;flex-shrink:0;"></div>
      <button class="mode-btn" id="layout-btn">&#9671; Grupy</button>
      <div style="width:1px;height:18px;background:var(--border-accent);margin:0 2px;align-self:center;flex-shrink:0;"></div>
      <button class="mode-btn" id="collapse-btn">&#9636; Rozpad</button>
      <button class="mode-btn" id="bridges-btn">&#9670; Mosty</button>
    </div>
    <div id="collapse-banner"></div>
    <svg id="graph-svg"></svg>
  </div>

  <div id="right-panel">
    <div id="node-card">
      <div class="empty-state" id="card-empty">
        <div class="icon">✦</div>
        <div>Kliknij postać<br>aby zobaczyć szczegóły</div>
      </div>
      <div id="card-content" style="display:none;">
        <div id="card-name"></div>
        <div id="card-community-tag"></div>
        <div id="card-metrics"></div>
        <div id="card-connections"></div>
      </div>
    </div>

    <div id="legend">
      <h3>Społeczności</h3>
      <div id="legend-items"></div>
    </div>

    <div id="ranking">
      <div id="ranking-tabs">
        <div class="rank-tab active" data-rank="degree">Stopień</div>
        <div class="rank-tab" data-rank="betweenness">Pośred.</div>
        <div class="rank-tab" data-rank="closeness">Bliskość</div>
        <div class="rank-tab" data-rank="pagerank">PageRank</div>
        <div class="rank-tab" data-rank="anomaly">Anomalie</div>
      </div>
      <div id="ranking-list"></div>
    </div>
  </div>
</div>

<div id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-row"><span class="tt-key">Stopień</span><span class="tt-val" id="tt-deg"></span></div>
  <div class="tt-row"><span class="tt-key">Pośrednictwo</span><span class="tt-val" id="tt-bet"></span></div>
  <div class="tt-row"><span class="tt-key">PageRank</span><span class="tt-val" id="tt-pr"></span></div>
</div>

// ===== PARSE GRAPHML =====
function parseGraphML(xmlStr) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlStr, 'application/xml');
  const nodes = [];
  const edges = [];
  const nodeMap = {};

  doc.querySelectorAll('node').forEach(n => {
    let id = n.getAttribute('id');
    if (!nodeMap[id]) {
      nodeMap[id] = { id, label: id === 'JACK_TYLER_SPLIT' ? 'JACK/TYLER' : id };
      nodes.push(nodeMap[id]);
    }
  });

  doc.querySelectorAll('edge').forEach(e => {
    const src = e.getAttribute('source');
    const tgt = e.getAttribute('target');
    const wEl = e.querySelector('data[key="d0"]');
    const weight = wEl ? parseInt(wEl.textContent) : 1;
    if (nodeMap[src] && nodeMap[tgt]) {
      edges.push({ source: src, target: tgt, weight });
    }
  });

  return { nodes, edges, nodeMap };
}

// ===== SNA METRICS =====
function computeMetrics(nodes, edges) {
  const n = nodes.length;
  const adj = {};
  const adjW = {};
  nodes.forEach(nd => { adj[nd.id] = []; adjW[nd.id] = {}; });

  edges.forEach(e => {
    adj[e.source].push(e.target);
    adj[e.target].push(e.source);
    adjW[e.source][e.target] = (adjW[e.source][e.target] || 0) + e.weight;
    adjW[e.target][e.source] = (adjW[e.target][e.source] || 0) + e.weight;
  });

  // Weighted Degree
  const degree = {};
  nodes.forEach(nd => {
    degree[nd.id] = Object.values(adjW[nd.id]).reduce((a,b) => a+b, 0);
  });

  // BFS distances (unweighted)
  function bfs(startId) {
    const dist = {};
    nodes.forEach(nd => dist[nd.id] = Infinity);
    dist[startId] = 0;
    const queue = [startId];
    while (queue.length) {
      const u = queue.shift();
      for (const v of adj[u]) {
        if (dist[v] === Infinity) { dist[v] = dist[u] + 1; queue.push(v); }
      }
    }
    return dist;
  }

  // Betweenness (Brandes)
  const betweenness = {};
  nodes.forEach(nd => betweenness[nd.id] = 0);

  nodes.forEach(s => {
    const stack = [];
    const pred = {};
    nodes.forEach(nd => pred[nd.id] = []);
    const sigma = {};
    nodes.forEach(nd => sigma[nd.id] = 0);
    sigma[s.id] = 1;
    const dist = {};
    nodes.forEach(nd => dist[nd.id] = -1);
    dist[s.id] = 0;
    const queue = [s.id];
    while (queue.length) {
      const v = queue.shift();
      stack.push(v);
      for (const w of adj[v]) {
        if (dist[w] < 0) { queue.push(w); dist[w] = dist[v] + 1; }
        if (dist[w] === dist[v] + 1) { sigma[w] += sigma[v]; pred[w].push(v); }
      }
    }
    const delta = {};
    nodes.forEach(nd => delta[nd.id] = 0);
    while (stack.length) {
      const w = stack.pop();
      for (const v of pred[w]) {
        delta[v] += (sigma[v] / sigma[w]) * (1 + delta[w]);
      }
      if (w !== s.id) betweenness[w] += delta[w];
    }
  });

  const normBC = (n - 1) * (n - 2) / 2;
  nodes.forEach(nd => betweenness[nd.id] = normBC > 0 ? betweenness[nd.id] / normBC : 0);

  // Closeness
  const closeness = {};
  nodes.forEach(nd => {
    const dist = bfs(nd.id);
    const sum = Object.values(dist).filter(d => d < Infinity && d > 0).reduce((a,b) => a+b, 0);
    const reachable = Object.values(dist).filter(d => d < Infinity && d > 0).length;
    closeness[nd.id] = sum > 0 ? reachable / sum : 0;
  });

  // PageRank
  const d = 0.85;
  const pr = {};
  nodes.forEach(nd => pr[nd.id] = 1/n);
  for (let iter = 0; iter < 20; iter++) {
    const newPR = {};
    nodes.forEach(nd => newPR[nd.id] = (1 - d) / n);
    nodes.forEach(nd => {
      const out = adj[nd.id].length;
      if (out > 0) {
        adj[nd.id].forEach(nb => { newPR[nb] += d * pr[nd.id] / out; });
      } else {
        nodes.forEach(nd2 => { newPR[nd2.id] += d * pr[nd.id] / n; });
      }
    });
    nodes.forEach(nd => pr[nd.id] = newPR[nd.id]);
  }

  // Local Clustering
  const clustering = {};
  nodes.forEach(nd => {
    const nbrs = adj[nd.id];
    const k = nbrs.length;
    if (k < 2) { clustering[nd.id] = 0; return; }
    let triangles = 0;
    for (let i = 0; i < nbrs.length; i++) {
      for (let j = i + 1; j < nbrs.length; j++) {
        if (adj[nbrs[i]].includes(nbrs[j])) triangles++;
      }
    }
    clustering[nd.id] = 2 * triangles / (k * (k - 1));
  });

  // Community detection (Louvain modularity optimization)
  const communities = louvainCommunity(nodes, edges);

  // Density
  const density = 2 * edges.length / (n * (n - 1));

  return { degree, betweenness, closeness, pagerank: pr, clustering, communities, density, adj, adjW };
}

function louvainCommunity(nodes, edges) {
  // Phase-1 Louvain: greedy modularity optimization (deterministic iteration order)
  const nodeIds = nodes.map(n => n.id);

  // Weighted adjacency
  const W = {};
  nodeIds.forEach(id => W[id] = {});
  edges.forEach(e => {
    W[e.source][e.target] = (W[e.source][e.target] || 0) + e.weight;
    W[e.target][e.source] = (W[e.target][e.source] || 0) + e.weight;
  });

  const m = Math.max(1, edges.reduce((s, e) => s + e.weight, 0));

  // Node strength (weighted degree)
  const ki = {};
  nodeIds.forEach(id => {
    ki[id] = Object.values(W[id]).reduce((s, v) => s + v, 0);
  });

  // Initialize: each node in its own community
  const comm = {};
  nodeIds.forEach(id => comm[id] = id);

  // Community stats: sigma_tot = sum of ki, sigma_in = 2 * internal edge weights
  const sigma_tot = {}, sigma_in = {};
  nodeIds.forEach(id => { sigma_tot[id] = ki[id]; sigma_in[id] = 0; });

  let changed = true;
  let iter = 0;
  while (changed && iter < 150) {
    changed = false;
    iter++;
    for (const i of nodeIds) {
      const ci = comm[i];
      const ki_i = ki[i];

      // Aggregate weights from i to each neighboring community
      const w_to = {};
      for (const [j, w] of Object.entries(W[i])) {
        const cj = comm[j];
        w_to[cj] = (w_to[cj] || 0) + w;
      }
      const w_ci = w_to[ci] || 0;

      // Temporarily remove i from ci
      sigma_in[ci] -= 2 * w_ci;
      sigma_tot[ci] -= ki_i;

      // ΔQ(i→c) = w_ic/m − ki*(sigma_tot[c])/(2m²), maximize over candidate communities
      // baseline: gain for returning to ci (now excluding i)
      const gain_ci = w_ci / m - ki_i * sigma_tot[ci] / (2 * m * m);

      let bestComm = ci, bestGain = 0;
      for (const [nc, w_nc] of Object.entries(w_to)) {
        if (nc === ci) continue;
        const gain = w_nc / m - ki_i * (sigma_tot[nc] || 0) / (2 * m * m) - gain_ci;
        if (gain > bestGain) { bestGain = gain; bestComm = nc; }
      }

      // Move i to bestComm
      sigma_in[bestComm] = (sigma_in[bestComm] || 0) + 2 * (w_to[bestComm] || 0);
      sigma_tot[bestComm] = (sigma_tot[bestComm] || 0) + ki_i;
      comm[i] = bestComm;
      if (bestComm !== ci) changed = true;
    }
  }

  // Sort communities by size descending → index 0 = largest
  const groups = {};
  nodeIds.forEach(id => { const c = comm[id]; (groups[c] = groups[c] || []).push(id); });
  const sortedComms = Object.keys(groups).sort((a, b) => groups[b].length - groups[a].length);
  const commMap = {};
  sortedComms.forEach((c, i) => commMap[c] = i);

  const result = {};
  nodeIds.forEach(id => result[id] = commMap[comm[id]]);
  return result;
}

// Community identity rules — matched in order against community members
const COMM_IDENTITY_RULES = [
  { keys: ['JACK', 'TYLER', 'MARLA'],            name: 'Triada Władzy',       color: '#e02010' },
  { keys: ['ANGEL FACE', 'RICKY', 'MECHANIC'],   name: 'Space Monkeys',       color: '#4a7fc0' },
  { keys: ['EVERYONE', 'LEADER', 'CHLOE', 'SPEAKER', 'BOB'], name: 'Grupy Wsparcia', color: '#c8960a' },
  { keys: ['BALD DETECTIVE','BALDY','REDHEAD','STERN','DETECTIVE STERN','COP'], name: 'Aparat Państwa', color: '#5a8a50' },
  { keys: ['FIRST MAN', 'SECOND MAN', 'SEMINARIAN'], name: 'Epizodyczne',     color: '#8a5a30' },
];
const FALLBACK_COLORS = ['#9040a0','#c06030','#507070','#6a5040','#3a6070','#7a4060'];

// Assign name+color to each community index based on which key characters are in it
function buildCommunityInfo(nodes, communities) {
  const groups = {};
  nodes.forEach(n => { const c = communities[n.id]; (groups[c] = groups[c] || []).push(n.id); });
  const info = {};
  let fallbackIdx = 0;
  // Sort by community index so assignment is stable
  Object.keys(groups).map(Number).sort((a,b) => a-b).forEach(c => {
    const members = groups[c];
    let matched = false;
    for (const rule of COMM_IDENTITY_RULES) {
      if (rule.keys.some(k => members.includes(k))) {
        info[c] = { name: rule.name, color: rule.color };
        matched = true;
        break;
      }
    }
    if (!matched) {
      info[c] = { name: 'Peryferia Narracyjne', color: FALLBACK_COLORS[fallbackIdx++ % FALLBACK_COLORS.length] };
    }
  });
  return info;
}

// Normalize metrics for visual scaling
function normalizeMetric(key, nodes) {
  const vals = nodes.map(n => n[key]);
  const min = Math.min(...vals), max = Math.max(...vals);
  return id => max > min ? (nodes.find(n=>n.id===id)[key] - min) / (max - min) : 0.5;
}

const normDeg = normalizeMetric('degree', nodes);
const normBet = normalizeMetric('betweenness', nodes);
const normClo = normalizeMetric('closeness', nodes);
const normPR  = normalizeMetric('pagerank', nodes);

function hexToRgba(hex, alpha) {
  const normalized = hex.replace('#', '');
  const full = normalized.length === 3
    ? normalized.split('').map(ch => ch + ch).join('')
    : normalized;
  const value = parseInt(full, 16);
  const r = (value >> 16) & 255;
  const g = (value >> 8) & 255;
  const b = value & 255;
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function getNodeRadius(node, mode) {
  if (heroMode) {
    return 2.4 + normDeg(node.id) * 5.8;
  }
  const base = 5, range = 22;
  let norm;
  if (mode === 'degree') norm = normDeg(node.id);
  else if (mode === 'betweenness') norm = normBet(node.id);
  else if (mode === 'closeness') norm = normClo(node.id);
  else if (mode === 'pagerank') norm = normPR(node.id);
  else norm = normDeg(node.id);
  return base + norm * range;
}

function getCollisionRadius(node, mode) {
  const base = getNodeRadius(node, mode);
  if (!heroMode) return base + 5;
  return base + Math.min(46, node.label.length * 2.9);
}

function getHeroLabelSize(node, mode = 'degree') {
  const r = getNodeRadius(node, mode);
  return Math.max(11, Math.min(20, 9.6 + r * 1.25)) + 'px';
}

// ===== STATE VARIABLES (must be declared before simulation) =====
let currentMode = 'degree';
let selectedNode = null;
let clusterMode = false;
const clusterTargets = {};

function initClusterTargets() {
  // Arrange community centroids in a circle, largest community at top
  const uniqueComms = [...new Set(nodes.map(n => n.community))].sort((a, b) => {
    const sa = nodes.filter(n => n.community === a).length;
    const sb = nodes.filter(n => n.community === b).length;
    return sb - sa;
  });
  const nc = uniqueComms.length;
  const radius = Math.min(width, height) * 0.30;
  uniqueComms.forEach((c, i) => {
    const angle = (2 * Math.PI * i / nc) - Math.PI / 2;
    clusterTargets[c] = {
      x: width / 2 + radius * Math.cos(angle),
      y: height / 2 + radius * Math.sin(angle)
    };
  });
}

function clusterForce(alpha) {
  nodes.forEach(n => {
    const t = clusterTargets[n.community];
    if (!t) return;
    n.vx += (t.x - n.x) * 0.45 * alpha;
    n.vy += (t.y - n.y) * 0.45 * alpha;
  });
}

function toggleClusterLayout() {
  clusterMode = !clusterMode;
  const btn = document.getElementById('layout-btn');
  if (clusterMode) {
    initClusterTargets();
    simulation.force('cluster', clusterForce);
    simulation.force('charge').strength(-35);
    simulation.force('link').distance(() => 25).strength(0.15);
    btn.classList.add('active');
  } else {
    simulation.force('cluster', null);
    simulation.force('charge').strength(-180);
    simulation.force('link')
      .distance(d => Math.max(40, 200 / (1 + d.weight * 0.2)))
      .strength(0.5);
    btn.classList.remove('active');
  }
  simulation.alphaTarget(0.3).restart();
  setTimeout(() => simulation.alphaTarget(0), 2800);
}

// ===== D3 FORCE GRAPH =====
const svg = d3.select('#graph-svg');
const container = document.getElementById('graph-container');

let width = container.clientWidth;
let height = container.clientHeight;

svg.attr('width', width).attr('height', height);

const g = svg.append('g');

// Zoom
const zoom = d3.zoom().scaleExtent([0.2, 4]).on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom).on('dblclick.zoom', null);

svg.on('click', function(e) {
  if (e.target === this || e.target.tagName === 'svg') resetHighlight();
});

// Weight range for edge styling
const weights = edges.map(e => e.weight);
const wMin = Math.min(...weights), wMax = Math.max(...weights);
const wScale = d3.scaleLinear().domain([wMin, wMax]).range([0.6, 4.5]);
const wOpacity = d3.scaleLinear().domain([wMin, wMax]).range([0.38, 0.88]);

// Build link objects
const linkData = edges.map(e => ({
  source: e.source, target: e.target, weight: e.weight,
  strokeWidth: wScale(e.weight),
  opacity: wOpacity(e.weight)
}));

const simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(linkData).id(d => d.id).distance(d => {
    const w = d.weight;
    return heroMode
      ? Math.max(52, 250 / (1 + w * 0.15))
      : Math.max(40, 200 / (1 + w * 0.2));
  }).strength(0.5))
  .force('charge', d3.forceManyBody().strength(heroMode ? -260 : -180))
  .force('center', d3.forceCenter(width / 2, height / 2))
  .force('collision', d3.forceCollide().radius(d => getCollisionRadius(d, currentMode)));

const linkSel = g.append('g').selectAll('line')
  .data(linkData).join('line')
  .attr('stroke', heroMode ? 'rgba(216, 205, 192, 0.3)' : '#6a4832')
  .attr('stroke-width', d => heroMode ? Math.max(heroEdgeMinWidth, d.strokeWidth * heroEdgeWidthMultiplier) : d.strokeWidth)
  .attr('stroke-opacity', d => heroMode ? Math.max(heroEdgeMinOpacity, d.opacity * heroEdgeOpacityMultiplier) : d.opacity);

const nodeGroup = g.append('g').selectAll('g')
  .data(nodes).join('g')
  .attr('class', 'node-g')
  .call(d3.drag()
    .on('start', dragStart)
    .on('drag', dragged)
    .on('end', dragEnd));

const circSel = nodeGroup.append('circle')
  .attr('r', d => getNodeRadius(d, 'degree'))
  .attr('fill', d => heroMode ? hexToRgba(d.color, 0.16) : d.color)
  .attr('stroke', heroMode ? 'rgba(0,0,0,0.28)' : 'rgba(0,0,0,0.5)')
  .attr('stroke-width', heroMode ? 0.8 : 1);

const labelSel = nodeGroup.append('text')
  .text(d => d.label)
  .attr('text-anchor', 'middle')
  .attr('dy', d => heroMode ? '0.32em' : getNodeRadius(d, 'degree') + 9)
  .attr('font-family', "'Oswald', sans-serif")
  .attr('font-weight', heroMode ? '300' : '400')
  .attr('fill', heroMode ? '#efe5d7' : '#b0a090')
  .attr('font-size', d => heroMode ? getHeroLabelSize(d, 'degree') : Math.max(7, Math.min(11, getNodeRadius(d, 'degree') * 0.6)) + 'px')
  .attr('stroke', heroMode ? 'rgba(8, 7, 6, 0.88)' : 'none')
  .attr('stroke-width', heroMode ? 2.4 : 0)
  .attr('paint-order', 'stroke')
  .attr('pointer-events', 'none')
  .attr('letter-spacing', '0.05em');

// Tooltip
const tooltip = document.getElementById('tooltip');
if (!heroMode) {
  nodeGroup.on('mousemove', function(e, d) {
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
    document.getElementById('tt-name').textContent = d.label;
    document.getElementById('tt-deg').textContent = d.degree;
    document.getElementById('tt-bet').textContent = d.betweenness.toFixed(4);
    document.getElementById('tt-pr').textContent = d.pagerank.toFixed(4);
  }).on('mouseleave', () => { tooltip.style.display = 'none'; });

  nodeGroup.on('click', function(e, d) {
    e.stopPropagation();
    highlightNode(d);
    showNodeCard(d);
  });
}

simulation.on('tick', () => {
  linkSel
    .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  nodeGroup.attr('transform', d => `translate(${d.x},${d.y})`);
  if (bridgeRingLayer) {
    bridgeRingLayer.selectAll('circle').attr('cx', d => d.x).attr('cy', d => d.y);
  }
  if (islandRingLayer) {
    islandRingLayer.selectAll('circle').attr('cx', d => d.x).attr('cy', d => d.y);
  }
});

// Auto-fit after simulation
setTimeout(() => {
  simulation.alphaTarget(0).restart();
  setTimeout(() => autoFit(), 3000);
}, 100);

function autoFit() {
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    if (n.x < minX) minX = n.x;
    if (n.x > maxX) maxX = n.x;
    if (n.y < minY) minY = n.y;
    if (n.y > maxY) maxY = n.y;
  });
  const padded = heroMode ? 110 : 60;
  const scaleX = (width - padded * 2) / (maxX - minX || 1);
  const scaleY = (height - padded * 2) / (maxY - minY || 1);
  const scale = Math.min(scaleX, scaleY, 2);
  const tx = width / 2 - scale * (minX + maxX) / 2;
  const ty = height / 2 - scale * (minY + maxY) / 2;
  svg.transition().duration(1200).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

// Drag
function dragStart(e, d) { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
function dragged(e, d) { d.fx = e.x; d.fy = e.y; }
function dragEnd(e, d) { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }

// ===== MODE CONTROLS =====

document.querySelectorAll('.mode-btn[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    const mode = btn.dataset.mode;
    if (mode === 'reset') {
      currentMode = 'degree';
      document.querySelectorAll('.mode-btn[data-mode]').forEach(b => b.classList.remove('active'));
      document.querySelector('[data-mode="degree"]').classList.add('active');
    } else {
      currentMode = mode;
      document.querySelectorAll('.mode-btn[data-mode]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    updateNodeSizes();
  });
});

document.getElementById('layout-btn').addEventListener('click', toggleClusterLayout);

function updateNodeSizes() {
  circSel.transition().duration(500)
    .attr('r', d => getNodeRadius(d, currentMode));
  labelSel.transition().duration(500)
    .attr('dy', d => heroMode ? '0.32em' : getNodeRadius(d, currentMode) + 9)
    .attr('font-size', d => heroMode ? getHeroLabelSize(d, currentMode) : Math.max(7, Math.min(11, getNodeRadius(d, currentMode) * 0.6)) + 'px');
  simulation.force('collision', d3.forceCollide().radius(d => getCollisionRadius(d, currentMode)));
  simulation.alphaTarget(0.1).restart();
  setTimeout(() => simulation.alphaTarget(0), 800);
}

// ===== HIGHLIGHT =====

function highlightNode(d) {
  selectedNode = d;
  const neighborSet = new Set(adj[d.id]);
  neighborSet.add(d.id);

  nodeGroup.transition().duration(200)
    .attr('opacity', nd => neighborSet.has(nd.id) ? 1 : 0.07);

  linkSel.transition().duration(200)
    .attr('stroke-opacity', l =>
      (l.source.id === d.id || l.target.id === d.id) ? 0.9 : 0.03);

  circSel.attr('stroke', nd => nd.id === d.id ? '#e8b020' : 'rgba(0,0,0,0.5)')
         .attr('stroke-width', nd => nd.id === d.id ? 2.5 : 1);
}

function resetHighlight() {
  selectedNode = null;
  nodeGroup.transition().duration(200).attr('opacity', 1);
  linkSel.transition().duration(200).attr('stroke-opacity', d => d.opacity);
  circSel.attr('stroke', 'rgba(0,0,0,0.5)').attr('stroke-width', 1);
  document.getElementById('card-empty').style.display = 'flex';
  document.getElementById('card-content').style.display = 'none';
}

// ===== NODE CARD =====
const metricMaxes = {
  degree: Math.max(...nodes.map(n => n.degree)),
  betweenness: Math.max(...nodes.map(n => n.betweenness)),
  closeness: Math.max(...nodes.map(n => n.closeness)),
  pagerank: Math.max(...nodes.map(n => n.pagerank)),
  clustering: 1
};

function showNodeCard(d) {
  document.getElementById('card-empty').style.display = 'none';
  document.getElementById('card-content').style.display = 'block';

  document.getElementById('card-name').textContent = d.label;
  const tag = document.getElementById('card-community-tag');
  tag.textContent = d.commName || 'Inne';
  tag.style.background = d.color + '33';
  tag.style.color = d.color;
  tag.style.border = `1px solid ${d.color}66`;

  const metricsEl = document.getElementById('card-metrics');
  const metricsData = [
    { label: 'Stopień', val: d.degree, max: metricMaxes.degree, fmt: v => v.toFixed(0) },
    { label: 'Pośrednictwo', val: d.betweenness, max: metricMaxes.betweenness, fmt: v => v.toFixed(4) },
    { label: 'Bliskość', val: d.closeness, max: metricMaxes.closeness, fmt: v => v.toFixed(4) },
    { label: 'PageRank', val: d.pagerank, max: metricMaxes.pagerank, fmt: v => v.toFixed(4) },
    { label: 'Klasteryzacja', val: d.clustering, max: 1, fmt: v => v.toFixed(3) },
  ];
  metricsEl.innerHTML = metricsData.map(m => `
    <div class="metric-row">
      <div class="metric-label">${m.label}</div>
      <div class="metric-bar-wrap"><div class="metric-bar-fill" style="width:${m.max>0?(m.val/m.max*100):0}%;background:${d.color}"></div></div>
      <div class="metric-value">${m.fmt(m.val)}</div>
    </div>`).join('');

  // Top connections
  const conns = Object.entries(adjW[d.id])
    .sort((a,b) => b[1] - a[1]).slice(0, 5);

  const connEl = document.getElementById('card-connections');
  connEl.innerHTML = `<div class="connections-title">Najsilniejsze powiązania</div>` +
    conns.map(([nb, w]) => {
      const nbNode = nodes.find(n => n.id === nb);
      const col = nbNode ? nbNode.color : '#888';
      return `<div class="conn-row"><span style="color:${col}">${nb === 'JACK_TYLER_SPLIT' ? 'JACK/TYLER' : nb}</span><span class="conn-weight">${w}</span></div>`;
    }).join('');
}

// ===== RANKING =====
let currentRankMetric = 'degree';
let currentFilterComm = null;

function renderAnomalyRanking() {
  const avgRatio = nodes.reduce((s, n) => s + (n.degree > 0 ? n.betweenness / n.degree : 0), 0) / nodes.length;
  const anomalies = nodes
    .map(n => ({ ...n, ratio: n.degree > 0 ? n.betweenness / n.degree : 0 }))
    .filter(n => n.ratio > avgRatio)
    .sort((a, b) => b.ratio - a.ratio);

  const listEl = document.getElementById('ranking-list');
  if (anomalies.length === 0) {
    listEl.innerHTML = '<div style="padding:14px;font-size:0.62rem;color:var(--gray-mid);letter-spacing:0.1em;text-transform:uppercase;">Brak anomalii</div>';
    return;
  }
  listEl.innerHTML = anomalies.map((n, i) => `
    <div class="rank-row anomaly-row" data-id="${n.id}">
      <div class="rank-num">${i+1}</div>
      <div class="rank-dot" style="background:${n.color}"></div>
      <div class="rank-name">${n.label}</div>
      <div class="anomaly-cols">
        <div class="anomaly-col">${n.degree.toFixed(0)}</div>
        <div class="anomaly-col hi">${n.betweenness.toFixed(3)}</div>
        <div class="anomaly-col red">${n.ratio.toFixed(4)}</div>
      </div>
    </div>`).join('');
  listEl.querySelectorAll('.anomaly-row').forEach(row => {
    row.addEventListener('click', () => {
      const nd = nodes.find(n => n.id === row.dataset.id);
      if (nd) { highlightNode(nd); showNodeCard(nd); }
    });
  });
}

function renderRanking() {
  if (currentRankMetric === 'anomaly') { renderAnomalyRanking(); return; }
  const metric = currentRankMetric;
  let sorted = [...nodes].sort((a, b) => b[metric] - a[metric]);
  if (currentFilterComm !== null) sorted = sorted.filter(n => n.community === currentFilterComm);
  sorted = sorted.slice(0, 15);

  const maxVal = Math.max(...sorted.map(n => n[metric]));
  const listEl = document.getElementById('ranking-list');
  listEl.innerHTML = sorted.map((n, i) => {
    const pct = maxVal > 0 ? (n[metric] / maxVal * 100) : 0;
    const fmt = metric === 'degree' ? n[metric].toFixed(0) : n[metric].toFixed(4);
    return `<div class="rank-row" data-id="${n.id}">
      <div class="rank-num">${i+1}</div>
      <div class="rank-dot" style="background:${n.color}"></div>
      <div class="rank-name">${n.label}</div>
      <div class="rank-bar-wrap"><div class="rank-bar-fill" style="width:${pct}%;background:${n.color}"></div></div>
      <div class="rank-val">${fmt}</div>
    </div>`;
  }).join('');

  listEl.querySelectorAll('.rank-row').forEach(row => {
    row.addEventListener('click', () => {
      const nd = nodes.find(n => n.id === row.dataset.id);
      if (nd) { highlightNode(nd); showNodeCard(nd); }
    });
  });
}

document.querySelectorAll('.rank-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.rank-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentRankMetric = tab.dataset.rank;
    renderRanking();
  });
});

function filterRankByCommunity(ci) {
  currentFilterComm = currentFilterComm === ci ? null : ci;
  renderRanking();
}

renderRanking();

function refreshGraphLayout({ fit = false } = {}) {
  const nextWidth = container.clientWidth;
  const nextHeight = container.clientHeight;

  if (nextWidth < 40 || nextHeight < 40) return false;

  const sizeChanged = nextWidth !== width || nextHeight !== height;
  width = nextWidth;
  height = nextHeight;

  svg.attr('width', width).attr('height', height);
  simulation.force('center', d3.forceCenter(width / 2, height / 2));

  if (sizeChanged) {
    simulation.alphaTarget(0.08).restart();
    setTimeout(() => simulation.alphaTarget(0), 500);
  }

  if (fit) {
    setTimeout(() => autoFit(), 220);
  }
  return true;
}

// Resize
window.addEventListener('resize', () => {
  refreshGraphLayout();
});

// When the iframe becomes visible in Reveal, parent asks for a relayout.
window.addEventListener('message', (event) => {
  if (!event.data || event.data.type !== 'fight-club:refresh-layout') return;
  if (!refreshGraphLayout({ fit: true })) {
    setTimeout(() => refreshGraphLayout({ fit: true }), 140);
  }
});

// Handle hidden->visible transitions when this page is embedded.
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) refreshGraphLayout({ fit: true });
});

if ('ResizeObserver' in window) {
  const resizeObserver = new ResizeObserver(() => {
    refreshGraphLayout();
  });
  resizeObserver.observe(container);
}

window.addEventListener('load', () => {
  setTimeout(() => refreshGraphLayout({ fit: true }), 120);
});

// ===== FEATURE 1: ROZPAD (Collapse) — with island separation =====

let collapseActive = false;
const COLLAPSE_IDS = new Set(['JACK', 'TYLER']);
const ISLAND_COLORS = ['#c8960a','#4090c0','#9040a0','#3aaa70','#c05030','#6070b0','#b03060','#30b0a0','#a07820','#7050a0'];

let islandRingLayer = null;
let collapseIslandMembership = null;
let collapseIslandTargets = null;

function getComponentMembership(excludeIds) {
  const excluded = new Set(excludeIds);
  const active = nodes.filter(n => !excluded.has(n.id));
  const membership = {};
  const components = [];
  const visited = new Set();
  for (const n of active) {
    if (visited.has(n.id)) continue;
    const comp = [];
    const queue = [n.id];
    visited.add(n.id);
    while (queue.length) {
      const u = queue.shift();
      comp.push(u);
      for (const v of adj[u]) {
        if (!excluded.has(v) && !visited.has(v)) { visited.add(v); queue.push(v); }
      }
    }
    components.push(comp);
  }
  // largest first → index 0 = main cluster
  components.sort((a, b) => b.length - a.length);
  components.forEach((comp, i) => comp.forEach(id => membership[id] = i));
  return { components, membership };
}

function islandClusterForce(alpha) {
  if (!collapseIslandTargets || !collapseIslandMembership) return;
  nodes.forEach(n => {
    if (COLLAPSE_IDS.has(n.id)) return;
    const ci = collapseIslandMembership[n.id];
    if (ci === undefined || !collapseIslandTargets[ci]) return;
    const t = collapseIslandTargets[ci];
    n.vx += (t.x - n.x) * 0.55 * alpha;
    n.vy += (t.y - n.y) * 0.55 * alpha;
  });
}

document.getElementById('collapse-btn').addEventListener('click', () => {
  collapseActive = !collapseActive;
  const btn = document.getElementById('collapse-btn');
  const banner = document.getElementById('collapse-banner');

  if (collapseActive) {
    btn.classList.add('active');
    btn.textContent = '\u21BA Przywr\u00F3\u0107';

    // Fade out excluded nodes and their edges
    nodeGroup.transition().duration(400)
      .attr('opacity', d => COLLAPSE_IDS.has(d.id) ? 0 : 1)
      .style('pointer-events', d => COLLAPSE_IDS.has(d.id) ? 'none' : null);
    linkSel.transition().duration(400)
      .attr('stroke-opacity', d =>
        (COLLAPSE_IDS.has(d.source.id) || COLLAPSE_IDS.has(d.target.id)) ? 0 : d.opacity);

    // Rebuild link force WITHOUT edges touching JACK/TYLER — otherwise D3's spring
    // force pulls all their neighbours toward their (invisible) position, blowing up the layout
    const activeLinks = linkData.filter(d =>
      !COLLAPSE_IDS.has(d.source.id) && !COLLAPSE_IDS.has(d.target.id));
    simulation.force('link', d3.forceLink(activeLinks)
      .id(d => d.id)
      .distance(d => Math.max(40, 200 / (1 + d.weight * 0.2)))
      .strength(0.5));

    // Compute islands
    const { components, membership } = getComponentMembership(['JACK', 'TYLER']);
    collapseIslandMembership = membership;
    const nc = components.length;

    // Layout: largest island near center, rest arranged in a ring
    const cx = width / 2, cy = height / 2;
    const ringR = Math.min(width, height) * (nc <= 5 ? 0.30 : nc <= 10 ? 0.33 : 0.36);
    collapseIslandTargets = { 0: { x: cx, y: cy } };
    for (let i = 1; i < nc; i++) {
      const angle = (2 * Math.PI * (i - 1) / (nc - 1)) - Math.PI / 2;
      collapseIslandTargets[i] = {
        x: cx + ringR * Math.cos(angle),
        y: cy + ringR * Math.sin(angle)
      };
    }

    // Colored island rings
    if (islandRingLayer) islandRingLayer.remove();
    islandRingLayer = g.append('g').attr('class', 'island-ring-layer');
    islandRingLayer.selectAll('circle')
      .data(nodes.filter(n => !COLLAPSE_IDS.has(n.id)))
      .join('circle')
      .attr('r', d => getNodeRadius(d, currentMode) + 5)
      .attr('fill', 'none')
      .attr('stroke', d => ISLAND_COLORS[(collapseIslandMembership[d.id] || 0) % ISLAND_COLORS.length])
      .attr('stroke-width', 1.8)
      .attr('stroke-opacity', 0.8)
      .attr('cx', d => d.x)
      .attr('cy', d => d.y);

    // Weaker charge + island cluster force → components drift apart
    simulation.force('islandCluster', islandClusterForce);
    simulation.force('charge').strength(-55);
    simulation.alphaTarget(0.35).restart();
    setTimeout(() => simulation.alphaTarget(0), 3500);

    banner.style.display = 'none';

  } else {
    btn.classList.remove('active');
    btn.textContent = '\u25A0 Rozpad';

    // Restore full link force (with JACK/TYLER edges back in)
    simulation.force('link', d3.forceLink(linkData)
      .id(d => d.id)
      .distance(d => Math.max(40, 200 / (1 + d.weight * 0.2)))
      .strength(0.5));
    nodeGroup.transition().duration(400).attr('opacity', 1).style('pointer-events', null);
    linkSel.transition().duration(400).attr('stroke-opacity', d => d.opacity);

    simulation.force('islandCluster', null);
    simulation.force('charge').strength(clusterMode ? -35 : -180);
    simulation.alphaTarget(0.15).restart();
    setTimeout(() => simulation.alphaTarget(0), 1500);

    collapseIslandMembership = null;
    collapseIslandTargets = null;
    if (islandRingLayer) { islandRingLayer.remove(); islandRingLayer = null; }
    banner.style.display = 'none';
  }
});

// ===== FEATURE 2: MOSTY (Bridges) =====

let bridgesActive = false;
let bridgeRingLayer = null;

function findBridges() {
  const bridges = new Set();
  const bridgeNodes = new Set();
  const visited = {};
  const disc = {};
  const low = {};
  const parent = {};
  let timer = 0;

  nodes.forEach(n => { visited[n.id] = false; parent[n.id] = null; });

  function dfs(u) {
    visited[u] = true;
    disc[u] = low[u] = timer++;
    for (const v of adj[u]) {
      if (!visited[v]) {
        parent[v] = u;
        dfs(v);
        low[u] = Math.min(low[u], low[v]);
        if (low[v] > disc[u]) {
          bridges.add([u, v].sort().join('\u001F'));
          bridgeNodes.add(u);
          bridgeNodes.add(v);
        }
      } else if (v !== parent[u]) {
        low[u] = Math.min(low[u], disc[v]);
      }
    }
  }

  nodes.forEach(n => { if (!visited[n.id]) dfs(n.id); });
  return { bridges, bridgeNodes };
}

function edgeBridgeKey(d) {
  return [d.source.id, d.target.id].sort().join('\u001F');
}

document.getElementById('bridges-btn').addEventListener('click', () => {
  bridgesActive = !bridgesActive;
  const btn = document.getElementById('bridges-btn');

  if (bridgesActive) {
    btn.classList.add('active');
    const { bridges, bridgeNodes } = findBridges();

    linkSel
      .attr('stroke', d => bridges.has(edgeBridgeKey(d)) ? '#e02010' : '#6a4832')
      .attr('stroke-opacity', d => bridges.has(edgeBridgeKey(d)) ? 0.88 : d.opacity * 0.45)
      .attr('stroke-dasharray', d => bridges.has(edgeBridgeKey(d)) ? '6 3' : null)
      .attr('stroke-width', d => bridges.has(edgeBridgeKey(d)) ? Math.max(2, d.strokeWidth) : d.strokeWidth);

    if (bridgeRingLayer) bridgeRingLayer.remove();
    bridgeRingLayer = g.append('g').attr('class', 'bridge-ring-layer');
    const bridgeNodeData = nodes.filter(n => bridgeNodes.has(n.id));
    bridgeRingLayer.selectAll('circle')
      .data(bridgeNodeData)
      .join('circle')
      .attr('class', 'bridge-ring')
      .attr('r', d => getNodeRadius(d, currentMode) + 5)
      .attr('fill', 'none')
      .attr('stroke', '#c8960a')
      .attr('stroke-width', 2.5)
      .attr('cx', d => d.x)
      .attr('cy', d => d.y);
  } else {
    btn.classList.remove('active');

    linkSel
      .attr('stroke', '#6a4832')
      .attr('stroke-opacity', d => d.opacity)
      .attr('stroke-dasharray', null)
      .attr('stroke-width', d => d.strokeWidth);

    if (bridgeRingLayer) { bridgeRingLayer.remove(); bridgeRingLayer = null; }
  }
});
