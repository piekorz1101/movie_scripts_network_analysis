<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Pulp Fiction — Analiza Sieci Postaci</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');

  :root {
    --blood: #c0392b;
    --gold: #f39c12;
    --cream: #f5e6c8;
    --dark: #0d0d0d;
    --mid: #1a1a1a;
    --smoke: #2a2a2a;
    --c0: #e74c3c;
    --c1: #3498db;
    --c2: #2ecc71;
    --text: #d4c4a0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Courier Prime', monospace;
    min-height: 100vh;
  }

  /* TITLE */
  header {
    text-align: center;
    padding: 32px 20px 16px;
    border-bottom: 1px solid #333;
    position: relative;
  }

  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--blood), var(--gold), var(--blood));
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 6vw, 5rem);
    letter-spacing: 0.15em;
    color: var(--cream);
    text-shadow: 2px 2px 0 var(--blood), 4px 4px 0 #000;
    line-height: 1;
  }

  .subtitle {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    margin-top: 6px;
    text-transform: uppercase;
  }

  /* LAYOUT */
  .container {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 0;
    height: calc(100vh - 130px);
  }

  /* GRAPH */
  #graph-panel {
    position: relative;
    border-right: 1px solid #333;
  }

  #graph-svg {
    width: 100%;
    height: 100%;
  }

  /* CONTROLS */
  .controls {
    position: absolute;
    top: 12px;
    left: 12px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .ctrl-btn {
    background: #1a1a1a;
    border: 1px solid #444;
    color: var(--text);
    font-family: 'Courier Prime', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    padding: 5px 10px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .ctrl-btn:hover, .ctrl-btn.active {
    background: var(--blood);
    border-color: var(--blood);
    color: #fff;
  }

  /* SIDEBAR */
  #sidebar {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--mid);
  }

  .panel {
    padding: 16px;
    border-bottom: 1px solid #333;
  }

  .panel-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    margin-bottom: 12px;
  }

  /* NODE CARD */
  #node-card {
    min-height: 200px;
  }

  #node-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.1em;
    color: var(--cream);
    line-height: 1;
    margin-bottom: 2px;
  }

  #node-community-tag {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 2px;
    display: inline-block;
    margin-bottom: 12px;
  }

  .metric-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    border-bottom: 1px solid #2a2a2a;
    font-size: 0.72rem;
  }
  .metric-label { color: #888; letter-spacing: 0.05em; }
  .metric-val { color: var(--gold); font-weight: bold; }

  .metric-bar-wrap {
    height: 3px;
    background: #333;
    flex: 1;
    margin: 0 8px;
  }
  .metric-bar {
    height: 100%;
    background: var(--blood);
    transition: width 0.4s ease;
  }

  /* LEGEND */
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.72rem;
    margin-bottom: 6px;
    cursor: pointer;
    opacity: 0.9;
    transition: opacity 0.2s;
  }
  .legend-item:hover { opacity: 1; }
  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* RANKING TABLE */
  #ranking-panel {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }

  #ranking-panel::-webkit-scrollbar { width: 4px; }
  #ranking-panel::-webkit-scrollbar-track { background: #111; }
  #ranking-panel::-webkit-scrollbar-thumb { background: #444; }

  .rank-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .rank-tab {
    background: #111;
    border: 1px solid #333;
    color: #888;
    font-family: 'Courier Prime', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    padding: 3px 8px;
    cursor: pointer;
    text-transform: uppercase;
  }
  .rank-tab.active {
    border-color: var(--gold);
    color: var(--gold);
  }

  .rank-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid #222;
    cursor: pointer;
    transition: background 0.15s;
    font-size: 0.72rem;
  }
  .rank-row:hover { background: #1f1f1f; }
  .rank-num {
    color: #555;
    width: 18px;
    text-align: right;
    flex-shrink: 0;
  }
  .rank-name { flex: 1; color: var(--cream); }
  .rank-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .rank-score {
    color: var(--gold);
    width: 50px;
    text-align: right;
    font-size: 0.68rem;
  }
  .rank-bar-wrap {
    width: 50px;
    height: 2px;
    background: #333;
  }
  .rank-bar { height: 100%; background: var(--blood); }

  /* TOOLTIP */
  #tooltip {
    position: fixed;
    background: rgba(10,10,10,0.95);
    border: 1px solid var(--blood);
    color: var(--cream);
    padding: 8px 12px;
    font-size: 0.7rem;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 999;
    font-family: 'Courier Prime', monospace;
    max-width: 200px;
  }
  #tooltip.visible { opacity: 1; }
  #tooltip strong {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.1em;
    display: block;
    color: var(--gold);
    margin-bottom: 2px;
  }

  .placeholder-text {
    color: #555;
    font-size: 0.72rem;
    font-style: italic;
    line-height: 1.6;
  }

  /* Edge highlight */
  line.dimmed { opacity: 0.04; }
  circle.dimmed { opacity: 0.08; }
  text.dimmed { opacity: 0.05; }
</style>
</head>

<header>

  <div class="subtitle">Analiza Sieci Postaci &nbsp;·&nbsp; Social Network Analysis &nbsp;·&nbsp; Humanistyka Cyfrowa</div>

        <button class="rank-tab" data-rank="pagerank">PageRank</button>

      <div id="rank-list"></div>
    </div>
  </div>
</div>

const CLUSTER_TARGETS = {

  1: { x:  200, y: -150 },  // Butch — prawo-góra
  2: { x:    0, y:  220 },  // Diner/Honey Bunny — dół
};

function clusterForce(alpha) {
  GRAPH.nodes.forEach(n => {
    const t = CLUSTER_TARGETS[n.community];
    if (!t) return;
    n.vx += (t.x - n.x) * 0.45 * alpha;
    n.vy += (t.y - n.y) * 0.45 * alpha;
  });
}

function toggleClusterLayout() {
  clusterMode = !clusterMode;
  const btn = document.getElementById('layout-btn');
  if (clusterMode) {
    sim.force('cluster', clusterForce);
    sim.force('charge').strength(-35);
    sim.force('link').distance(() => 25).strength(0.15);
    btn.classList.add('active');
  } else {
    sim.force('cluster', null);
    sim.force('charge').strength(-180);
    sim.force('link')
      .distance(d => 80 - d.weight * 2)
      .strength(d => 0.2 + d.weight * 0.05);
    btn.classList.remove('active');
  }
  sim.alphaTarget(0.3).restart();
  setTimeout(() => sim.alphaTarget(0), 2800);
}

const maxBet = Math.max(...GRAPH.nodes.map(n => n.betweenness));
const maxClo = Math.max(...GRAPH.nodes.map(n => n.closeness));
const maxPR  = Math.max(...GRAPH.nodes.map(n => n.pagerank));
const maxWeight = Math.max(...GRAPH.edges.map(e => e.weight));

function getRadius(node, mode) {
  const base = 5, scale = 28;
  switch(mode) {
    case 'degree': return base + (node.degree / maxDeg) * scale;
    case 'betweenness': return base + (node.betweenness / maxBet) * scale;
    case 'closeness': return base + (node.closeness / maxClo) * scale;
    case 'pagerank': return base + (node.pagerank / maxPR) * scale;
  }
  return base + (node.degree / maxDeg) * scale;
}

const nodeMap = {};
GRAPH.nodes.forEach(n => { nodeMap[n.id] = n; });

const sim = d3.forceSimulation(GRAPH.nodes)
  .force('link', d3.forceLink(GRAPH.edges).id(d => d.id).distance(d => 80 - d.weight * 2).strength(d => 0.2 + d.weight * 0.05))
  .force('charge', d3.forceManyBody().strength(-180))
  .force('center', d3.forceCenter(0, 0))
  .force('collision', d3.forceCollide().radius(d => getRadius(d, currentMode) + 4));

// Edges
const link = g.append('g').selectAll('line')
  .data(GRAPH.edges).enter().append('line')
  .attr('stroke', '#555')
  .attr('stroke-opacity', d => 0.15 + (d.weight / maxWeight) * 0.5)
  .attr('stroke-width', d => 0.5 + (d.weight / maxWeight) * 3);

// Node groups
const node = g.append('g').selectAll('g')
  .data(GRAPH.nodes).enter().append('g')
  .style('cursor', 'pointer')
  .call(d3.drag()
    .on('start', (e,d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag',  (e,d) => { d.fx=e.x; d.fy=e.y; })
    .on('end',   (e,d) => { if (!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

const circles = node.append('circle')
  .attr('r', d => getRadius(d, currentMode))
  .attr('fill', d => COMM_COLORS[d.community])
  .attr('fill-opacity', 0.85)
  .attr('stroke', d => COMM_COLORS[d.community])
  .attr('stroke-width', 1.5)
  .attr('stroke-opacity', 0.5);

const labels = node.append('text')
  .text(d => d.id)
  .attr('font-family', 'Courier Prime, monospace')
  .attr('font-size', d => d.degree > 20 ? '9px' : '7px')
  .attr('fill', '#ccc')
  .attr('text-anchor', 'middle')
  .attr('dy', d => getRadius(d, currentMode) + 10)
  .attr('pointer-events', 'none');

sim.on('tick', () => {
  link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  node.attr('transform', d => `translate(${d.x},${d.y})`);
});

// ---- INTERACTIONS ----
const tooltip = document.getElementById('tooltip');

node.on('mouseover', (e, d) => {
  tooltip.innerHTML = `<strong>${d.id}</strong>Stopień: ${d.degree}<br>PageRank: ${d.pagerank.toFixed(4)}<br>Pośrednictwo: ${d.betweenness.toFixed(4)}`;
  tooltip.classList.add('visible');
})
.on('mousemove', e => {
  tooltip.style.left = (e.clientX + 12) + 'px';
  tooltip.style.top  = (e.clientY - 10) + 'px';
})
.on('mouseout', () => tooltip.classList.remove('visible'))
.on('click', (e, d) => {
  e.stopPropagation();
  selectedNode = d.id;
  highlightNode(d);
  showNodeCard(d);
});

svg.on('click', () => {
  selectedNode = null;
  clearHighlight();
  showNodeCard(null);
});

function highlightNode(d) {
  const neighbors = new Set([d.id]);
  GRAPH.edges.forEach(e => {
    if (e.source.id === d.id || e.source === d.id) neighbors.add(e.target.id || e.target);
    if (e.target.id === d.id || e.target === d.id) neighbors.add(e.source.id || e.source);
  });

  link.classed('dimmed', l => {
    const sid = l.source.id || l.source;
    const tid = l.target.id || l.target;
    return sid !== d.id && tid !== d.id;
  });
  circles.classed('dimmed', n => !neighbors.has(n.id));
  labels.classed('dimmed', n => !neighbors.has(n.id));
  circles.attr('stroke-width', n => n.id === d.id ? 3 : 1.5)
         .attr('stroke', n => n.id === d.id ? '#fff' : COMM_COLORS[n.community]);
}

function clearHighlight() {
  link.classed('dimmed', false);
  circles.classed('dimmed', false);
  labels.classed('dimmed', false);
  circles.attr('stroke-width', 1.5).attr('stroke', n => COMM_COLORS[n.community]);
}

function showNodeCard(d) {
  const card = document.getElementById('node-card');
  if (!d) {
    card.innerHTML = `<div class="panel-title">Postać</div><div class="placeholder-text">Kliknij węzeł na grafie,<br>aby zobaczyć szczegóły...</div>`;
    return;
  }

  const metricMaxes = { degree: maxDeg, betweenness: maxBet, closeness: maxClo, pagerank: maxPR, clustering: 1 };
  const metricDefs = [
    { key: 'degree', label: 'Stopień (ważony)' },
    { key: 'betweenness', label: 'Pośrednictwo' },
    { key: 'closeness', label: 'Bliskość' },
    { key: 'pagerank', label: 'PageRank' },
    { key: 'clustering', label: 'Klasteryzacja' },
  ];

  let rows = metricDefs.map(m => {
    const pct = (d[m.key] / metricMaxes[m.key]) * 100;
    return `<div class="metric-row">
      <span class="metric-label">${m.label}</span>
      <div class="metric-bar-wrap"><div class="metric-bar" style="width:${pct}%"></div></div>
      <span class="metric-val">${m.key === 'degree' ? d[m.key] : d[m.key].toFixed(4)}</span>
    </div>`;
  }).join('');

  // Neighbors
  const neighbors = [];
  GRAPH.edges.forEach(e => {
    const s = e.source.id || e.source, t = e.target.id || e.target;
    if (s === d.id) neighbors.push({ id: t, weight: e.weight });
    if (t === d.id) neighbors.push({ id: s, weight: e.weight });
  });
  neighbors.sort((a,b) => b.weight - a.weight);
  const nbStr = neighbors.slice(0, 5).map(n => `<span style="color:${COMM_COLORS[nodeMap[n.id]?.community||0]}">${n.id}</span> (${n.weight})`).join(', ');

  card.innerHTML = `
    <div class="panel-title">Postać</div>
    <div id="node-name">${d.id}</div>
    <div id="node-community-tag" style="background:${COMM_COLORS[d.community]}33;color:${COMM_COLORS[d.community]};border:1px solid ${COMM_COLORS[d.community]}66">${COMM_NAMES[d.community]}</div>
    ${rows}
    <div style="margin-top:10px;font-size:0.68rem;color:#888;">
      Główne powiązania:<br><span style="color:var(--text)">${nbStr}</span>
    </div>
  `;
}

// ---- MODE BUTTONS ----
document.querySelectorAll('.ctrl-btn[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    const mode = btn.dataset.mode;
    if (mode === 'reset') {
      sim.alpha(0.5).restart();
      clearHighlight();
      selectedNode = null;
      showNodeCard(null);
      return;
    }
    currentMode = mode;
    document.querySelectorAll('.ctrl-btn[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    circles.transition().duration(500).attr('r', d => getRadius(d, mode));
    labels.transition().duration(500).attr('dy', d => getRadius(d, mode) + 10);
    sim.force('collision', d3.forceCollide().radius(d => getRadius(d, mode) + 4));
    sim.alpha(0.3).restart();

    updateRanking(currentRankMetric);
  });
});

document.getElementById('layout-btn').addEventListener('click', toggleClusterLayout);

// ---- RANKING ----
function updateRanking(metric) {
  const sorted = [...GRAPH.nodes].sort((a,b) => b[metric] - a[metric]).slice(0, 15);
  const maxVal = sorted[0][metric];
  const list = document.getElementById('rank-list');
  list.innerHTML = sorted.map((n, i) => {
    const pct = (n[metric] / maxVal) * 100;
    const val = metric === 'degree' ? n[metric].toFixed(0) : n[metric].toFixed(4);
    return `<div class="rank-row" data-id="${n.id}">
      <span class="rank-num">${i+1}</span>
      <div class="rank-dot" style="background:${COMM_COLORS[n.community]}"></div>
      <span class="rank-name">${n.id}</span>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${pct}%"></div></div>
      <span class="rank-score">${val}</span>
    </div>`;
  }).join('');

  list.querySelectorAll('.rank-row').forEach(row => {
    row.addEventListener('click', () => {
      const id = row.dataset.id;
      const d = nodeMap[id];
      if (d) {
        selectedNode = id;
        highlightNode(d);
        showNodeCard(d);
      }
    });
  });
}

document.querySelectorAll('.rank-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.rank-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentRankMetric = tab.dataset.rank;
    updateRanking(currentRankMetric);
  });
});

updateRanking('degree');

// Initial zoom to fit
setTimeout(() => {
  const bounds = g.node().getBBox();
  const w = W(), h = H();
  const scale = Math.min(w / (bounds.width + 80), h / (bounds.height + 80)) * 0.85;
  const tx = w/2 - scale * (bounds.x + bounds.width/2);
  const ty = h/2 - scale * (bounds.y + bounds.height/2);
  svg.call(d3.zoom().transform, d3.zoomIdentity.translate(tx,ty).scale(scale));
}, 2500);
</script>
</body>
</html>
